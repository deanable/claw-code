name: Release binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  build-windows:
    name: build-windows
    runs-on: windows-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target

      - name: Build release binaries
        run: cargo build --release -p rusty-claude-cli --bins

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Stage Windows installer files
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart('v')
          $dist = Join-Path $PWD "dist"
          $package = Join-Path $dist "installer-root"
          New-Item -ItemType Directory -Force -Path $dist | Out-Null
          New-Item -ItemType Directory -Force -Path $package | Out-Null

          $claw = Join-Path $dist "claw-$version-windows-x64.exe"
          $launcher = Join-Path $dist "claw-launcher-$version-windows-x64.exe"
          $readme = Join-Path $package "README.txt"
          $installerReadme = Join-Path "..\installer" "README.txt"

          Copy-Item "target\release\claw.exe" $claw -Force
          Copy-Item "target\release\claw-launcher.exe" $launcher -Force
          Copy-Item $installerReadme $readme -Force
          Copy-Item "..\rust\.claw" $package -Recurse -Force
          Copy-Item $claw (Join-Path $package (Split-Path $claw -Leaf)) -Force
          Copy-Item $launcher (Join-Path $package (Split-Path $launcher -Leaf)) -Force
          Copy-Item "..\installer\claw.iss" (Join-Path $dist "claw.iss") -Force

      - name: Build Windows installer
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart('v')
          $dist = Join-Path $PWD "dist"
          $package = Join-Path $dist "installer-root"
          $iscc = Join-Path ([Environment]::GetFolderPath('ProgramFilesX86')) "Inno Setup 6\ISCC.exe"

          & $iscc "/DAppVersion=$version" "/DSourceRoot=$package" "/DOutputDir=$dist" "dist\claw.iss"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: claw-windows-installer
          path: rust/dist/claw-*-windows-x64-installer.exe

      - name: Upload release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: rust/dist/claw-*-windows-x64-installer.exe
          fail_on_unmatched_files: true
