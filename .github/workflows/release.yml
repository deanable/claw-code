name: Release binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  build-windows:
    name: build-windows
    runs-on: windows-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target

      - name: Build release binaries
        run: cargo build --release -p rusty-claude-cli --bins

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Stage Windows installer files
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart('v')
          $dist = Join-Path $PWD "dist"
          $package = Join-Path $dist "installer-root"
          New-Item -ItemType Directory -Force -Path $dist | Out-Null
          New-Item -ItemType Directory -Force -Path $package | Out-Null

          # Copy binaries directly to package folder with simple names (what Inno Setup expects)
          Write-Host "Copying claw.exe to package folder"
          Copy-Item "target\release\claw.exe" (Join-Path $package "claw.exe") -Force -Verbose
          Write-Host "Copying claw-launcher.exe to package folder"
          Copy-Item "target\release\claw-launcher.exe" (Join-Path $package "claw-launcher.exe") -Force -Verbose
          
          # Copy README and .claw folder
          Write-Host "Copying README.txt"
          Copy-Item "..\installer\README.txt" (Join-Path $package "README.txt") -Force -Verbose
          Write-Host "Copying .claw folder"
          Copy-Item "..\rust\.claw" (Join-Path $package ".claw") -Recurse -Force -Verbose
          
          # Copy installer script to dist folder
          Write-Host "Copying installer script"
          Copy-Item "..\installer\claw.iss" (Join-Path $dist "claw.iss") -Force -Verbose
          
          # Also create versioned copies in dist for workflow artifacts
          Write-Host "Creating versioned copies in dist"
          Copy-Item "target\release\claw.exe" (Join-Path $dist "claw-$version-windows-x64.exe") -Force -Verbose
          Copy-Item "target\release\claw-launcher.exe" (Join-Path $dist "claw-launcher-$version-windows-x64.exe") -Force -Verbose
          
          Write-Host "`n=== Contents of package folder (for Inno Setup) ==="
          Get-ChildItem -Recurse $package | ForEach-Object { Write-Host $_.FullName }

      - name: Build Windows installer
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart('v')
          $dist = Join-Path $PWD "dist"
          $package = Join-Path $dist "installer-root"
          $iscc = Join-Path ([Environment]::GetFolderPath('ProgramFilesX86')) "Inno Setup 6\ISCC.exe"

          Write-Host "Running ISCC with:"
          Write-Host "  AppVersion: $version"
          Write-Host "  SourceRoot: $package"
          Write-Host "  OutputDir: $dist"
          Write-Host "  Script: dist\claw.iss"
          
          & $iscc "/DAppVersion=$version" "/DSourceRoot=$package" "/DOutputDir=$dist" "dist\claw.iss"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: claw-windows-installer
          path: rust/dist/claw-*-windows-x64-installer.exe

      - name: Upload release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: rust/dist/claw-*-windows-x64-installer.exe
          fail_on_unmatched_files: true
