name: Release binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  build-windows:
    name: build-windows
    runs-on: windows-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target

      - name: Build release binaries
        run: cargo build --release -p rusty-claude-cli --bins

      - name: Package Windows release assets
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          $dist = Join-Path $PWD "dist"
          $package = Join-Path $dist "package"
          New-Item -ItemType Directory -Force -Path $dist | Out-Null
          New-Item -ItemType Directory -Force -Path $package | Out-Null

          $claw = Join-Path $dist "claw-$version-windows-x64.exe"
          $launcher = Join-Path $dist "claw-launcher-$version-windows-x64.exe"
          $readme = Join-Path $package "README.txt"
          $installer = Join-Path $dist "claw-$version-windows-x64-installer.zip"

          Copy-Item "target\release\claw.exe" $claw -Force
          Copy-Item "target\release\claw-launcher.exe" $launcher -Force
          Copy-Item "..\release\README.txt" $readme -Force
          Copy-Item "..\release\.claw" $package -Recurse -Force

          if (Test-Path $installer) {
            Remove-Item $installer -Force
          }

          Copy-Item $claw (Join-Path $package (Split-Path $claw -Leaf)) -Force
          Copy-Item $launcher (Join-Path $package (Split-Path $launcher -Leaf)) -Force
          Compress-Archive -Path (Join-Path $package '*') -DestinationPath $installer -Force

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: claw-windows-x64
          path: |
            rust/dist/claw-${{ github.ref_name }}-windows-x64.exe
            rust/dist/claw-launcher-${{ github.ref_name }}-windows-x64.exe
            rust/dist/claw-${{ github.ref_name }}-windows-x64-installer.zip

      - name: Upload release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            rust/dist/claw-${{ github.ref_name }}-windows-x64.exe
            rust/dist/claw-launcher-${{ github.ref_name }}-windows-x64.exe
            rust/dist/claw-${{ github.ref_name }}-windows-x64-installer.zip
          fail_on_unmatched_files: true
